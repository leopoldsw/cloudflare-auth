name: Wrangler Dev Smoke

on:
  workflow_dispatch:

jobs:
  wrangler-dev-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 11.1.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm smoke:wrangler-dev
