name: Published Quickstart Smoke

on:
  workflow_dispatch:
    inputs:
      package_tag:
        description: "Beta npm dist-tag or x.y.z-beta.* prerelease version to smoke."
        required: true
        default: beta
        type: string

jobs:
  published-quickstart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.1.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm smoke:published-quickstart
        env:
          CF_AUTH_PUBLISHED_QUICKSTART_PACKAGE_TAG: ${{ inputs.package_tag }}
